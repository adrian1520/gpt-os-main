name: Deep Debug Memory V2

on:
  workflow_run:
    workflows: ["Legal OS Pipeline"]
    types:
      - completed

jobs:
  debug:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3

      - name: Extract debug info
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          STATUS=${{ github.event.workflow_run.conclusion }}
          NOW=$(date -Is)

          echo "{\"run_id\": \"$RUN_ID\", \"status\": \"$STATUS\", \"timestamp\": \"$NOW\", \"failed_step\": \"UNKNOWN\", \"error\": \"NO_LOGS_AVAILABLE\"}" >> memory/debug_log.json