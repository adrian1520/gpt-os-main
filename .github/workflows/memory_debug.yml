name: Deep Debug Memory API-ONLY FINAL

on:
  workflow_run:
    workflows: ["Legal OS Pipeline API-DRIVEN"]
    types:
      - completed

permissions:
  contents: write

jobs:
  debug:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Build debug json
        run: |
          now=$(date -Is)
          run_id=${{ github.event.workflow_run.id }}
          echo "{"run_id":"$run_id","timestamp":"$now"}" > debug.json

      - name: Prepare content (base64)
        run: |
          content=$(base64 -w 0 debug.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write via API action
        uses: ./.github/actions/api_write
        with:
          path: memory/debug/run_${{ github.event.workflow_run.id }}_${{ github.run_id }}.json
          content: ${{ env.CONTENT }}
          message: debug update
