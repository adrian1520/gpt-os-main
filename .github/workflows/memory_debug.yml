name: Deep Debug Memory V5

on:
  workflow_run:
    workflows: ["Legal OS Pipeline"]
    types:
      - completed

jobs:
  debug:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch jobs
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          curl -s -H "Authorization: token ${{ github.token}}" \
            "https://api.github.com/repos/${{github.repository}}/actions/runs/$RUN_ID/jobs" > jobs.json

      - name: Extract failed step
        run: |
          failed_step=$(jq -r '.jobs[].steps[] | select(.conclusion=="failure") | .name' jobs.json | head -n1)
          echo "FAILED_STEP=$failed_step" >> $GITHUB_ENV

      - name: Fetch logs
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          curl -s -H "Authorization: token ${{github.token}}" \
            "https://api.github.com/repos/${{github.repository}}/actions/runs/$RUN_ID/logs" -o logs.zip
          unzip -o logs.zip -d logs || true
          error=$(grep -r "error" logs | head -n1 || echo "no_error_found")
          echo "ERROR=$error" >> $GITHUB_ENV

      - name: Save structured debug
        run: |
          mkdir -p memory
          NOW=$(date -Is)

          if [ ! -f memory/debug_log.json ]; then
            echo "[]" > memory/debug_log.json
          fi

          json=$(jq --arg run "${{ github.event.workflow_run.id }}" \
                        --arg step "$FAILED_STEP" \
                         --arg err "$ERROR" \
                        --arg ts "$NOW" \
                        '. + [ { run_id: $run, failed_step: $step, error: $err, timestamp: $ts } ]' memory/debug_log.json)

          echo "$json" > memory/debug_log.json

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add memory/debug_log.json
          git commit -m "update structured debug log [skip ci]" || echo "no changes"
          git push