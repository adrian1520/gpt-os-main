name: Debug Memory API-ONLY FIXED

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build debug json
        run: |
          now=$(date -Is)
          printf '{"run_id":"%s","timestamp":"%s"}\n' "${{ github.run_id }}" "$now" > debug.json

      - name: Encode base64
        run: |
          content=$(base64 -w 0 debug.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write via API action
        uses: ./.github/actions/api_write
        with:
          path: memory/debug/run_${{ github.run_id }}.json
          content: ${{ env.CONTENT }}
          message: debug update
