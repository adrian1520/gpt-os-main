name: Deep Debug Memory V3

on:
  workflow_run:
    workflows: ["Legal OS Pipeline"]
    types:
      - completed

jobs:
  debug:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3

      - name: Fetch jobs
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          curl -s -H "Authorization: token ${{github.token}}" \
            "https://api.github.com/repos/${{github.repository}}/actions/runs/$RUN_ID/jobs" > jobs.json

      - name: Extract failed step
        run: |
          failed_step=$(jq -r '.jobs[].steps[] | select(.conclusion=="failure").step }' jobs.json | head -n1 )
          echo "FAILED_STEP=$failed_step" >> $GITHUB_ENV
        
      - name: Save debug
        run: |
          NOW=$(date -Is)
          echo "{\"run_id\": \"${{ github.event.workflow_run.id}}\", \"failed_step\": \"${{ env.FAILED_STEP }}\", \"timestamp\": \"$NOW\"}" >> memory/debug_log.json