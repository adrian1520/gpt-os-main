name: Deep Debug Memory API-ONLY

on:
  workflow_run:
    workflows: ["Legal OS Pipeline"]
    types:
      - completed

jobs:
  debug:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Fetch jobs (API)
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          curl -s -H "Authorization: token ${{ github.token}}" \
            "https://api.github.com/repos/${{github.repository}}/actions/runs/$RUN_ID/jobs" > jobs.json

      - name: Parse failure (Python)
        run: |
          python - << 'PY'
          import json
          with open("jobs.json") as f:
              data = json.load(f)

          failed_step = "no_fail"
          for job in data.get("jobs", []):
              for step in job.get("steps", []):
                  if step.get("conclusion") == "failure":
                      failed_step = step.get("name", "unknown")
          print(f"FAILED_STEP={failed_step}")
        PY
          echo "$FAILED_STEP" >> $GITHUB_ENV

      - name: Save debug (API safe)
        run: |
          mkdir -p memory
          NOW=$(date -Is)
          echo "{\"run_id\": \"${{ github.event.workflow_run.id }}\", \"failed_step\": \"${FAILED_STEP}\", \"timestamp\": \"$NOW\"}" > memory/debug_log.json

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add memory/debug_log.json
          git commit -m "debug log api-only update [skip ci]" || echo "no changes"
          git push