name: Deep Debug Memory API-ONLY FINAL

on:
  workflow_run:
    workflows: ["Legal OS Pipeline"]
    types:
      - completed

jobs:
  debug:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Fetch jobs
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          curl -s -H "Authorization: token ${{ github.token}}" \
            "https://api.github.com/repos/${{github.repository}}/actions/runs/$RUN_ID/jobs" > jobs.json

      - name: Parse failure 
        run: |
          python - << 'PY'
          import json, os
          with open("jobs.json") as f:
            data = json.load(f)

          failed_step = "no_fail"
          for job in data.get("jobs", []):
              for step in job.get("steps", []):
                  if step.get("conclusion") == "failure":
                      failed_step = step.get("name", "unknown")

          open("failed.txt", "w").write(failed_step)
          PY

      - name: Build JSON
        run: |
          now=$(date -Is)
          step=$(cat failed.txt)
          run_id=${{ github.event.workflow_run.id }}
          unique=$(date +%s)
          echo "{\"run_id\": \"$run_id\", \"failed_step\": \"$step\", \"timestamp\": \"$now\"}" > debug.json

      - name: Encode base64
        run: |
          content=$(base64 -w 0 debug.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Upload via API
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          UNIQUE=$(date +%s)
          curl -X PUT -i \
            -h "Authorization: token ${{ github.token }}" \
            -h "Content-Type: application/json" \
            -d "{\n  \"message\": \"debug run update\",\n  \"path\": \"memory/debug/run_$RUN_ID_$UNIQUE.json\",\n  \"content\": \"${CONTENT}\"\n}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/memory/debug/run_$RUN_ID_$UNIQUE.json"