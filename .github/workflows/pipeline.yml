name: Legal OS Pipeline (SINGLE PIPELINE)

on:
  push:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch events
        run: |
          curl -s -H "Authorization: Bearer ${{ github.token }}"             "https://api.github.com/repos/${{ github.repository }}/contents/events" > list.json

      - name: Parse event
        run: python scripts/parser.py

      - name: Run event engine
        run: python scripts/event_engine.py parsed.json event_out.json

      - name: Build SOT
        run: python tools/build_sot.py

      - name: Encode SOT
        run: |
          content=$(base64 -w 0 sot.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write SOT via API
        uses: ./.github/actions/api_write
        with:
          path: memory/source_of_truth.json
          content: ${{ env.CONTENT }}
          message: update SOT
