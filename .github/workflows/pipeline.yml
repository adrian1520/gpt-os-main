name: GPT-OS Core Pipeline

on:
  push:
    paths:
      - 'cases/**/input/**'

permissions:
  contents: write

jobs:
  process-case:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed case
        id: detect
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Run processing (placeholder)
        run: |
          echo "Processing file: ${{ steps.detect.outputs.file }}"
          echo "TODO: call parser + timeline + risk + strategy"

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto pipeline update [skip ci]" || echo "no changes"
          git push
