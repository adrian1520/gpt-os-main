name: GPT-OS Core Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write debug log
        run: |
          ts=$(date -u +"%Y%m%dT%H%M%S")
          echo '{"timestamp":"'"$ts"'","status":"running"}' > debug.json
          content=$(base64 -w 0 debug.json)
          echo "CONTENT_DEBUG=$content" >> $GITHUB_ENV

      - name: Save debug via API
        uses: ./.github/actions/api_write
        with:
          path: memory/debug/run_${{ github.run_id }}.json
          content: ${{ env.CONTENT_DEBUG }}
          message: debug log

      - name: Write session log
        run: |
          ts=$(date -u +"%Y%m%dT%H%M%S")
          echo '{"timestamp":"'"$ts"'","stage":"pipeline"}' > session.json
          content=$(base64 -w 0 session.json)
          echo "CONTENT_SESSION=$content" >> $GITHUB_ENV

      - name: Save session via API
        uses: ./.github/actions/api_write
        with:
          path: memory/session/session_${{ github.run_id }}.json
          content: ${{ env.CONTENT_SESSION }}
          message: session log

      - name: Build Source of Truth
        run: python tools/build_sot.py

      - name: Encode SOT
        run: |
          content=$(base64 -w 0 sot.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write SOT via API
        uses: ./.github/actions/api_write
        with:
          path: memory/source_of_truth.json
          content: ${{ env.CONTENT }}
          message: update SOT
