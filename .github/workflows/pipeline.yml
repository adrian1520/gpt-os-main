name: GPT-OS Core Pipeline

on:
  push:
    paths:
      - 'cases/**/input/**'

permissions:
  contents: write

jobs:
  process-case:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed file
        id: detect
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Run process_case
        run: |
          echo "Processing: ${{ steps.detect.outputs.file }}"
          python tools/process_case.py "${{ steps.detect.outputs.file }}"

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto process case [skip ci]" || echo "no changes"
          git push
