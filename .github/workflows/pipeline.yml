name: GPT-OS Core Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build repo tree (REAL)
        run: |
          printf '{"tree":[' > tree.json
          git ls-files | awk '{printf "{\"path\":\"%s\"},", $0}' >> tree.json
          sed -i '$ s/,$//' tree.json
          printf ']}' >> tree.json
