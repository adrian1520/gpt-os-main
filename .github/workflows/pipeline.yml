name: GPT-OS Core Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build SOT (capture)
        run: |
          set +e
          python -W ignore tools/build_sot.py > output.log 2> error.log
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Encode SOT
        run: |
          content=$(base64 -w 0 sot.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write SOT via API
        uses: ./.github/actions/api_write
        with:
          path: memory/source_of_truth.json
          content: ${{ env.CONTENT }}
          message: update SOT

      - name: Decision engine
        run: python tools/decision_engine.py

      - name: Act on decision (report failure)
        if: env.ACTION == 'report_failure'
        run: |
          echo "Failure detected → triggering dispatch"
          curl -X POST             -H "Authorization: token ${{ github.token }}"             -H "Accept: application/vnd.github+json"             https://api.github.com/repos/${{ github.repository }}/dispatches             -d '{"event_type":"debug_failure"}'

      - name: Act on decision (monitor)
        if: env.ACTION == 'monitor'
        run: echo "System running normally"

      - name: Act on decision (idle)
        if: env.ACTION == 'idle'
        run: echo "System stable"

      - name: Capture debug (real)
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            exit 0
          fi

          ts=$(date -u +"%Y%m%dT%H%M%S")
          LOG=$(tail -n 50 error.log 2>/dev/null || echo "no logs")

          printf '{
            "run_id": "%s",
            "workflow": "%s",
            "job": "%s",
            "status": "failed",
            "timestamp": "%s",
            "error_snippet": "%s"
          }'           "${{ github.run_id }}"           "${{ github.workflow }}"           "${{ github.job }}"           "$ts"           "$LOG" > debug.json

          content=$(base64 -w 0 debug.json)
          echo "CONTENT_DEBUG=$content" >> $GITHUB_ENV

      - name: Save debug
        if: always()
        uses: ./.github/actions/api_write
        with:
          path: memory/debug/run_${{ github.run_id }}.json
          content: ${{ env.CONTENT_DEBUG }}
          message: debug real

      - name: Cleanup debug cache
        run: |
          ls -t memory/debug/run_*.json 2>/dev/null | tail -n +11 | xargs -r rm
