name: GPT-OS Core Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Source of Truth
        run: python tools/build_sot.py

      - name: Encode SOT
        run: |
          content=$(base64 -w 0 sot.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write SOT via API
        uses: ./.github/actions/api_write
        with:
          path: memory/source_of_truth.json
          content: ${{ env.CONTENT }}
          message: update SOT
