name: Legal OS Pipeline API-DRIVEN

on:
  push:

permissions:
  contents: write
  actions: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch event list
        run: |
          curl -s -H "Authorization: Bearer ${{ github.token }}"             "https://api.github.com/repos/${{ github.repository }}/contents/events" > list.json

      - name: Fetch latest event (content)
        run: |
          python scripts/parser.py

      - name: Run event engine
        run: |
          python scripts/event_engine.py parsed.json event_out.json

      - name: Dispatch memory write (SAFE JSON)
        run: |
          payload=$(jq -n             --arg run_id "${{ github.run_id }}"             '{event_type:"write_memory_files", client_payload:{run_id:$run_id}}')

          curl -X POST             -H "Authorization: Bearer ${{ github.token }}"             -H "Accept: application/vnd.github+json"             -d "$payload"             https://api.github.com/repos/${{ github.repository }}/dispatches
