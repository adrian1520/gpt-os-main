name: GPT-OS Core Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Handle write_execution
        run: |
          if [ -f events/write_execution.json ]; then
            mkdir -p gpt-os-controller
            echo "# EXECUTION SYSTEM" > gpt-os-controller/execution.md
          fi

      - name: Build repo tree (REAL)
        run: |
          printf '{"tree":[' > tree.json
          git ls-files | while read f; do
            printf '{"path":"%s"},' "$f" >> tree.json
          done
          sed -i '$ s/,$//' tree.json
          printf ']}' >> tree.json

      - name: Build SOT (capture)
        run: |
          set +e
          python -W ignore tools/build_sot.py > output.log 2> error.log
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Decision engine
        run: python tools/decision_engine.py
