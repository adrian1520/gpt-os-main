name: GPT-OS Core Pipeline

on:
  push:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Source of Truth
        run: python tools/build_sot.py

      - name: Encode SOT
        run: |
          content=$(base64 -w 0 sot.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write SOT via API
        uses: ./.github/actions/api_write
        with:
          path: memory/source_of_truth.json
          content: ${{ env.CONTENT }}
          message: update SOT

      - name: Capture failure debug
        if: failure()
        run: |
          ts=$(date -u +"%Y%m%dT%H%M%S")

          printf '{
            "run_id": "%s",
            "workflow": "%s",
            "job": "%s",
            "repository": "%s",
            "run_url": "https://github.com/%s/actions/runs/%s",
            "status": "failed",
            "timestamp": "%s"
          }'           "${{ github.run_id }}"           "${{ github.workflow }}"           "${{ github.job }}"           "${{ github.repository }}"           "${{ github.repository }}"           "${{ github.run_id }}"           "$ts" > debug.json

          content=$(base64 -w 0 debug.json)
          echo "CONTENT_DEBUG=$content" >> $GITHUB_ENV

      - name: Save debug via API
        if: failure()
        uses: ./.github/actions/api_write
        with:
          path: memory/debug/run_${{ github.run_id }}.json
          content: ${{ env.CONTENT_DEBUG }}
          message: debug failure
