name: GPT-OS Core Pipeline

on:
  push:
    paths:
      - 'cases/**'
      - 'memory/**'
      - 'scripts/**'
      - 'tools/**'
      - 'events/**'

permissions:
  contents: write

jobs:
  process-case:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug repo structure
        run: |
          echo "=== FILE TREE ==="
          ls -R

      - name: Detect changed file
        id: detect
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Detected file: $FILE"

      - name: Set PYTHONPATH
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          echo "PYTHONPATH=$PYTHONPATHH"

      - name: Run pipeline engine
        run: |
          python tools/run_pipeline.py "${{ steps.detect.outputs.file }}"

      - name: Archive case
        run: |
          python - <<EOF
import os
from modules.archive.archive_manager import archive_case

path = "${{ steps.detect.outputs.file }}"
parts = path.split("/")
case_id = None

for i, p in enumerate(parts):
    if p.startswith("NSM_"):
        if i+1 < len(parts):
            case_id = f"{p}_{parts[i+1]}"
        else:
            case_id = p

if case_id:
    archive_case(case_id, source_file=path)
EOF


      - name: Update SOT
        run: |
          python tools/build_sot.py

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto process + sot sync [skip ci]" || echo "no changes"
          git push