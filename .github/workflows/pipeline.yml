name: GPT-OS Core Pipeline

on:
  push:
    paths:
      - 'cases/**/input/**'

permissions:
  contents: write

jobs:
  process-case:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug repo structure
        run: |
          echo "=== FILE TREE ==="
          ls -R

      - name: Detect changed file
        id: detect
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Detected file: $FILE"

      - name: Set PYTHONPATH
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          echo "PYTHONPATH=$PYTHONPATH"

      - name: Run process_case
        id: run_step
        run: |
          echo "Running process_case..."
          python tools/process_case.py "${{ steps.detect.outputs.file }}" && echo "SUCCESS" > status.txt || echo "FAIL" > status.txt

      - name: Log result
        run: |
          mkdir -p memory/debug
          STATUS=$(cat status.txt)
          TS=$(date +%s)

          if [ "$STATUS" = "SUCCESS" ]; then
            echo "{\"status\":\"success\",\"timestamp\":\"$TS\"}" > memory/debug/run_$TS.json
          else
            echo "{\"status\":\"failure\",\"timestamp\":\"$TS\"}" > memory/debug/run_$TS.json
            echo "Pipeline failed"
          fi

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto process case + log [skip ci]" || echo "no changes"
          git push
