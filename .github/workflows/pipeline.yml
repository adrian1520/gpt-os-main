name: Legal OS Pipeline API-DRIVEN

on:
  push:
    paths:
      - 'events/**'

permissions:
  contents: write

jobs:
  pipeline:
    if: github.actor != 'github-actions'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch latest event (API)
        run: |
          curl -s -H "Authorization: token ${{ github.token}}" \
            "https://api.github.com/repos/${{github.repository}}/contents/events" > events.json
          python - << 'PY'
          import json, base64
          data = json.load(open("events.json"))
          file = data[0]["name"]
          print("FILE:", file)
          content_raw = data[0]["content"] if "content" in data[0] else None
          open("event.json", "w").write(content_raw or "")
          PY

      - name: Run parser
        run: python scripts/parser.py event.json parsed.json

      - name: Run event engine
        run: python scripts/event_engine.py parsed.json event_out.json

      - name: Prepare API write
        run: |
          TMS=$(date +%s)
          content=$(base64 -w 0 event_out.json || true)
          echo "CONTENT_LEN=${{content}}"
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Upload via API
        run: |
          curl -X PUT -i \
            -h "Authorization: token ${{ github.token }}" \
            -h "Content-Type: application/json" \
            -d "{\n  \"message\": \"pipeline output api\",\n  \"path\": \"cases/test/events/event_$TMS.json\",\n  \"content\": \"${CONTENT}\"\n}" \
            "https://api.github.com/repos/${{github.repository }}/contents/cases/test/events/event_$TMS.json"