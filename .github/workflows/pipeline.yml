name: Legal OS Pipeline

on:
  push:
    paths:
      - 'events/**'

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3

      - name: Load event
        run: |
          file=$(ls events/ | head -n 1)
          cat "events/$file" > event.json

      - name: Run parser
        run: |
          python scripts/parser.py event.json parsed.json

      - name: Run event engine
        run: |
          python scripts/event_engine.py parsed.json event_out.json

      - name: Save event
        run: |
          mkdir -p cases/test/events
          mv event_out.json cases/test/events/event_$(date +%s).json

      - name: Save parsed
        run: |
          mkdir -p cases/test/documents/parsed
          mv parsed.json cases/test/documents/parsed/parsed_$(date +%s).json
      
      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add cases/
          git commit -m "pipeline output" || echo "no changes"
          git push