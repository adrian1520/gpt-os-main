name: Legal OS Pipeline

on:
  push:
    paths:
      - 'events/**'

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3

      - name: Load event
        run: |
          file=$(ls events/ | head -n 1)
          cat "events/$file" > event.json

      - name: Run parser
        run: |
          python scripts/parser.py event.json parsed.json

      - name: Save parsed
        run: |
          mkdir -p cases/test/documents/parsed
          mv parsed.json cases/test/documents/parsed/parsed_$(date +%s).json

      - name: Normalization
        run: echo "Normalization step"

      - name: Event Generation
        run: echo "Event generation step"

      - name: Entity Extraction
        run: echo "Entity extraction step"

      - name: Graph Build
        run: echo "Graph build step"

      - name: State Update
        run: echo "State update step"
