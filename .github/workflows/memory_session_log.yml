name: Dynamic Session Log

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Detect changes
        run: |
          files=$(git diff --name-only HEAD~1 HEAD)
          echo "FILES=$files" >> $GITHUB_ENV

      - name: Append session
        run: |
          now=$(date -Is)
          echo "{\"timestamp\": \"$now$\", \"files\": \"${{ env.FILES }}\"}" >> memory/session_log.json

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add memory/session_log.json
          git commit -m "update session log" || echo "no changes"
          git push