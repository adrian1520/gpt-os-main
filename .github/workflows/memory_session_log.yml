name: Dynamic Session Log

on:
  push:
    paths:
      - 'events/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Append session
        run: |
          now$=$(date -Is)\
          file=$(ls events/ | head -n 1)\
          echo "{\"timestamp\": \"$now$\", \"event\": \"$file\"}" >> memory/session_log.json

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add memory/session_log.json
          git commit -m "update session log" || echo "no changes"
          git push