name: Dynamic Session Log

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Detect changes
        run: |
          git diff --name-status HEAD~1 HEAD > changes.txt
          files=$(cat changes.txt | awk '{print $2}')
          echo "FILES=$files" >> $GITHUB_ENV

      - name: Classify change
        run: |
          type="unknown"
          if echo "${env.FILES }" | grep -q "scripts/"; then type="code_change"; fi
          if echo "${env.FILES }" | grep -q "cases/"; then type="data_change"; fi
          if echo "${env.FILES }" | grep -q ".github/"; then type="config_change"; fi
          echo "TYPE=$type" >> $GITHUB_ENV

      - name: Detect actions
        run: |
          added=$(grep '^A' changes.txt | awk '{print $2}')
          modified=$(grep '^M' changes.txt | awk '{print $2}')
          deleted=$(grep '^D' changes.txt | awk '{print $2}')

          echo "ADDDED=$added" >> $GITHBO_ENV
          echo "MODIFIED=$modified" >> $GITHBO_ENV
          echo "DELETED=$deleted" >> $GITHUB_ENV

      - name: Append session
        run: |
          now=$(date -Is)
          echo "{\"timestamp\": \"$now$\", \"type\": \"${{ env.TYPE }}\", \"files\": \"${{ env.FILES }}\", \"added\": \"${{ env.ADDED }}\", \"modified\": \"${{ env.MODIFIED }}\", \"deleted\": \"${{ env.DELETED }}\"}" >> memory/session_log.json
 
      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add memory/session_log.json
          git commit -m "update session log" || echo "no changes"
          git push