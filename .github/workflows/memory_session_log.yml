name: Dynamic Session Log

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect changes
        run: |
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            git diff --name-status HEAD~1 HEAD -> changes.txt
          else
            git ls-files > changes.txt
          fi
          files=$(cat changes.txt | awk '{print $2}')
          echo "FILES=$files" >> $GITHUB_ENV

      - name: Classify change
        run: |
          type="unknown"
          if echo "${env.FILES }" | grep -q "scripts/"; then type="code_change"; fi
          if echo "${env.FILES }" | grep -q "cases/"; then type="data_change"; fi
          if echo "${env.FILES }" | grep -q ".github/"; then type="config_change"; fi
          echo "TYPE=$type" >> $GITHUB_ENV

      - name: Append session
        run: |
          now$=$(date -Is)\
          echo "{\"timestamp\": \"$now$\", \"type\": \"${{ env.TYPE }}\", \"files\": \"${{ env.FILES }}\"}" >> memory/session_log.json

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add memory/session_log.json
          git commit -m "update session log" || echo "no changes"
          git push