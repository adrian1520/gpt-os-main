name: Memory Session Log

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  update:
    if: github.actor != 'github-actions'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Write memory
        run: |
          mkdir -p memory
          now=$(date -Is)\
          echo "{\"timestamp\": \"$now\"}" >> memory/session_log.json
 
      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add memory/session_log.json
          git commit -m "update session log [skip ci]" || echo "no changes"
          git push