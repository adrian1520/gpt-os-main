name: Memory Session API-ONLY

on:
  repository_dispatch:
    types: [write_memory_files]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build session json
        run: |
          now=$(date -Is)
          echo "{\"timestamp\":\"$now\"}" > session.json

      - name: Encode base64
        run: |
          content=$(base64 -w 0 session.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write via API action
        uses: ./.github/actions/api_write
        with:
          path: memory/session/session_${{ github.event.client_payload.run_id }}.json
          content: ${{ env.CONTENT }}
          message: session update
