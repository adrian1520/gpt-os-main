name: Source Of Truth Builder API-DRIVEN

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch repo tree (API)
        run: |
          curl -s -H "Authorization: token ${{ github.token }}"             "https://api.github.com/repos/${{ github.repository }}/git/trees/main?recursive=1" > tree.json

      - name: Build SOT (Python)
        run: python tools/build_sot.py

      - name: Encode base64
        run: |
          content=$(base64 -w 0 sot.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write via API action
        uses: ./.github/actions/api_write
        with:
          path: memory/source_of_truth.json
          content: ${{ env.CONTENT }}
          message: sot update
