name: Source Of Truth Builder API-DRIVEN

on:
  workflow_run:
    workflows:
      - "Legal OS Pipeline API-DRIVEN"
      - "Memory Session API-ONLY"
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch repo tree (API)
        run: |
          curl -s -H "Authorization: token ${{github.token}}" \
            "https://api.github.com/repos/${{github.repository}}/git/trees/main?recursive=1" > tree.json

      - name: Build SOT (Python)
        run: |
          python - << 'PY'
          import json, datetime

          with open("tree.json") as f:
              data = json.load(f)

          files = [item["path"] for item in data.get("tree", [])]

          debug_runs = [f for f in files if f.startswith("memory/debug/")]
          sessions = [f for f in files if f.startswith("memory/session/")]

          last_error = debug_runs[-1] if debug_runs else None

          if debug_runs:
              current_focus = "debug"
          elif sessions:
              current_focus = "continue"
          else:
              current_focus = "init"

          now = datetime.datetime.utcnow().isoformat() + "Z"

          sot = {
              "last_update": now,
              "repo_state": {
                  "files_count": len(files),
                  "debug_runs": len(debug_runs),
                  "sessions": len(sessions)
              },
              "debug_files": debug_runs[:10],
              "session_files": sessions[:10],
              "last_error": last_error,
              "current_focus": current_focus
          }

          open("sot.json", "w").write(json.dumps(sot))
          PY

      - name: Encode base64
        run: |
          content=$(base64 -w 0 sot.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Write via API action
        uses: ./.github/actions/api_write
        with:
          path: memory/source_of_truth.json
          content: ${{ env.CONTENT }}
          message: sot update
