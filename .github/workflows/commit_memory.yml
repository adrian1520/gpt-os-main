name: Commit Memory Engine

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  memory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Config git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Create run branch
        run: |
          BRANCH="run/$(date +%s)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Extract git changes
        run: |
          git log -1 --pretty="%s" > commit.txt
          git diff --name-only HEAD^1 HEAD > files.txt

      - name: Build memory
        run: |
          mkdir -p memory
          NOW=$(date -Is)
          files=$(tr '\n' ',' < files.txt | sed 's/,$//')
          echo "{\"timestamp\": \"$NOW\", \"files\": \"$files\"}" >> memory/history_log.json
          echo "{\"last_update\": \"$NOW\", \"files\": \"$files\"}" > memory/system_context.json
 
      - name: Commit memory on branch
        run: |
          git add memory/history_log.json memory/system_context.json
          git commit -m "memory update [skip ci]" || echo "no changes"
          git push origin $BRANCH

      - name: Merge to main
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          git merge --no-ff origin/$BRANCH
          git push origin main