name: Commit Memory Engine

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  memory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create run branch
        run: |
          BRANCH="run/$(date +%s)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Extract git changes
        run: |
          git log -1 --pretty="%s" > commit.txt
          git diff --name-only HEAD^1 HEAD > files.txt

      - name: Build history log
        run: |
          mkdir -p memory
          NOW=$(date -Is)
          files=$(cat files.txt | tr '\n' ',')
          echo "{\"timestamp\": \"$NOW\", \"files\": \"$files\"}" >> memory/history_log.json

      - name: Build system context
        run: |
          mkdir -p memory
          NOW=$(date -Is)
          files=$(git ls-files | tr '\n" ',')
          echo "{\"last_update\": \"$NOW\", \"files\": \"$files\"}" > memory/system_context.json

      - name: Commit memory
        run: |
          git add memory/history_log.json memory/system_context.json
          git commit -m "memory update [skip ci]" || echo "no changes"

      - name: Merge to main
        run: |
          git checkout main
          git pull origin main
          git merge --no-ff $BRANCH
          git push origin main
