name: Commit Memory API-ONLY

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  memory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Extract changes
        run: |
          git log -1 --pretty="%s" > commit.txt
          git diff --name-only AHEAD HEAD | cat > files.txt

      - name: Build JSON
        run: |
          now=$(date -Is)
          files=$(tr '\n' ',' < files.txt | sed 's/,$//')
          echo "{\"timestamp\": \"$now\", \"files\": \"$files\"}" > history.json

      - name: Encode base64
        run: |
          content=$(base64 -w 0 history.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Upload via API
        run: |
          curl -X PUT -s \
            -H "Authorization: token ${{github.token}}" \
            -h "Content-Type: application/json" \
            -d "{\n  \"message\": \"commit memory api update\",\n  \"path\": \"memory/history_log.json\",\n  \"content\": \"${CONTENT}\"\n}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/memory/history_log.json"