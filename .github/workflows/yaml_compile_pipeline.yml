name: YAML Compile Pipeline

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyraml

      - name: Compile YAML
        run: |
          echo "$YAML_INPUT" | python tools/yaml_compile.py > encoded.txt

      - name: Show result
        run: cat encoded.txt
