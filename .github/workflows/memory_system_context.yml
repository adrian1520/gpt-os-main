name: Dynamic System Context API-ONLY

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build JSON
        run: |
          now=$(date -Is)
          echo "{\"updated_at\": \"$now\"}" > context.json

      - name: Encode base64
        run: |
          content=$(base64 -w 0 context.json)
          echo "CONTENT=$content" >> $GITHUB_ENV

      - name: Upload via API
        run: |
          curl -X PUT -s \
            -H "Authorization: token ${{github.token}}" \
            -h "Content-Type: application/json" \
            -d "{\n  \"message\": \"system context api update\",\n  \"path\": \"memory/system_context.json\",\n  \"content\": \"${CONTENT}\"\n}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/memory/system_context.json"