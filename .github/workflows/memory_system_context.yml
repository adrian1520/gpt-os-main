name: Dynamic System Context

on:
  push:
    paths:
      - 'events/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update context
        run: |
          now$=$(date -Is)\
          file=$(ls events/ | head -n 1)\
          echo "{\"last_event\": \"$file\", \"updated_at\": \"$now\"}" > memory/system_context.json