name: Dynamic System Context

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'memory/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Update context
        run: |
          now$=$(date -Is)\
          echo "{\"updated_at\": \"$now\"}" > memory/system_context.json
      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add memory/system_context.json
          git commit -m "update system context" || echo "no changes"
          git push