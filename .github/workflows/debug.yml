name: GPT-OS Debug

on:
  push:
    paths:
      - 'events/debug/**'

  permissions:
    contents: write

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run debug engine
        run: |
          python tools/decision_engine.py

      - name: Rebuild SOT
        run: |
          python tools/build_sot.py

      - name: Commit SOT
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto debug + sot sync [skip ci]" || echo "no changes"
          git push
