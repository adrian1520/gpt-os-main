name: GPT-OS Analysis

on:
  push:
    paths:
      - 'events/system/**
'

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build repo tree
        run: |
          printf '{"tree":[' > tree.json
          git ls-files | while read f; do
            printf '{"path":"%s",' "$f" >> tree.json
          done
          sed -i '$ s/,$//' tree.json
          printf ']}' >> tree.json

      - name: Build SOT
        run: python tools/build_sot.py

      - name: Decision engine
        run: python tools/decision_engine.py
